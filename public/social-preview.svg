<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">GENSO-GEO social preview</title>
  <desc id="desc">An original shrine-boundary map illustration for the GENSO-GEO project.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdfa"/>
      <stop offset="0.52" stop-color="#f8efe3"/>
      <stop offset="1" stop-color="#f1dec8"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1">
